name: Installation et Publication de l'application
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    [cite_start]runs-on: self-hosted [cite: 287]
    steps:
      - name: Récupération du code
        [cite_start]uses: actions/checkout@v4 [cite: 290]

      - name: Installation nginx
        run: |
          sudo apt update
          sudo apt install -y nginx
          sudo mkdir -p /var/www/site
          sudo chown -R www-data:www-data /var/www/site [cite: 296]

      - name: Configuration nginx
        run: |
          sudo tee /etc/nginx/sites-available/site > /dev/null <<EOF
          server {
            listen 80;
            server_name _;
            root /var/www/site;
            index index.html;
            location / {
              try_files \$uri \$uri/ =404;
            }
          }
          EOF
          sudo ln -sf /etc/nginx/sites-available/site /etc/nginx/sites-enabled/site
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo cp index.html /var/www/site/index.html
          sudo chown www-data:www-data /var/www/site/index.html [cite: 314]

      - name: Redémarrage nginx
        run: |
          sudo systemctl enable nginx
          sudo systemctl restart nginx [cite: 318]